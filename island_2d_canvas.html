<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Isometric Island - Pure 2D Canvas</title>
<style>
  body { margin: 0; background: #ede8e0; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .label { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-family: sans-serif; font-size: 13px; color: #888; background: rgba(255,255,255,0.7); padding: 4px 14px; border-radius: 20px; }
</style>
</head>
<body>
<canvas id="iso"></canvas>
<div class="label">Pure 2D Canvas — No Three.js</div>
<script>
const cv = document.getElementById('iso');
const cx = cv.getContext('2d');
cv.width = 700; cv.height = 560;

function iso(x,z,y,ox,oy){ return { sx: ox+(x-z)*28, sy: oy+(x+z)*14-y*28 }; }

function face(pts,fill,str){
  cx.beginPath(); cx.moveTo(pts[0].sx,pts[0].sy);
  for(let i=1;i<pts.length;i++) cx.lineTo(pts[i].sx,pts[i].sy);
  cx.closePath(); cx.fillStyle=fill; cx.fill();
  if(str){cx.strokeStyle=str;cx.lineWidth=0.7;cx.stroke();}
}

function box(x,z,y,w,d,h,C,ox,oy){
  const s='rgba(0,0,0,0.12)';
  const p=(a,b,c)=>iso(a,b,c,ox,oy);
  face([p(x,z,y+h),p(x+w,z,y+h),p(x+w,z+d,y+h),p(x,z+d,y+h)],C[0],s);
  face([p(x,z+d,y+h),p(x+w,z+d,y+h),p(x+w,z+d,y),p(x,z+d,y)],C[1],s);
  face([p(x+w,z,y+h),p(x+w,z,y),p(x+w,z+d,y),p(x+w,z+d,y+h)],C[2],s);
}

function roofPrism(x,z,y,w,d,ph,C,ox,oy){
  const p=(a,b,c)=>iso(a,b,c,ox,oy);
  const pk1=p(x+w/2,z,y+ph), pk2=p(x+w/2,z+d,y+ph);
  const tl=p(x,z,y),tr=p(x+w,z,y),br=p(x+w,z+d,y),bl=p(x,z+d,y);
  face([tl,tr,pk1],C[0],'rgba(0,0,0,0.1)');
  face([tr,br,pk2,pk1],C[1],'rgba(0,0,0,0.1)');
  face([bl,pk2,pk1,tl],C[2],'rgba(0,0,0,0.1)');
  face([br,pk2,pk1,tr],C[2],'rgba(0,0,0,0.1)');
}

function blob(x,z,y,rx,ry,fill,ox,oy){
  const p=iso(x,z,y,ox,oy);
  cx.beginPath(); cx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2);
  cx.fillStyle=fill; cx.fill();
}

function tree(x,z,y,sc,lc,ox,oy){
  box(x-.07*sc,z-.07*sc,y,.14*sc,.14*sc,.45*sc,['#7a5030','#5a3010','#9a7050'],ox,oy);
  blob(x,z,y+.45*sc,22*sc,12*sc,lc,ox,oy);
  blob(x,z,y+.65*sc,17*sc,9*sc,shiftC(lc,20),ox,oy);
  blob(x,z,y+.82*sc,11*sc,6*sc,shiftC(lc,38),ox,oy);
}

function shiftC(h,a){
  let r=parseInt(h.slice(1,3),16)+a;
  let g=parseInt(h.slice(3,5),16)+a;
  let b=parseInt(h.slice(5,7),16);
  return `rgb(${Math.min(255,r)},${Math.min(255,g)},${b})`;
}

let t=0;

function draw(){
  const W=cv.width,H=cv.height;
  cx.clearRect(0,0,W,H);
  cx.fillStyle='#ede8e0'; cx.fillRect(0,0,W,H);
  const ox=W/2, oy=H/2+30;

  // ISLAND LAYERS
  [
    [-4,-4,-2,8,8,0.5,'#b8a898','#a09080','#c8b8a8'],
    [-3.6,-3.6,-1.5,7.2,7.2,0.5,'#c4b49e','#b0a08a','#d4c4ae'],
    [-3.2,-3.2,-1.0,6.4,6.4,0.5,'#ccbba8','#b8a890','#dcceb8'],
    [-2.8,-2.8,-0.5,5.6,5.6,0.5,'#d4c4ae','#c0b09a','#e0d0bc'],
    [-2.5,-2.5,0.0,5.0,5.0,0.5,'#ddd0b8','#c8bc9a','#eee0cc'],
  ].forEach(r=>box(r[0],r[1],r[2],r[3],r[4],r[5],[r[6],r[7],r[8]],ox,oy));

  // TOP GROUND
  box(-2.2,-2.2,0.5,4.4,4.4,0.28,['#7ab860','#4a8840','#8acc70'],ox,oy);
  box(-1.3,-0.9,0.78,2.6,2.0,0.1,['#c4a868','#a08840','#d8bc80'],ox,oy);

  // RIGHT LEDGE
  box(1.4,-1.0,0.0,2.0,1.8,0.8,['#c8b89a','#b0a080','#d8c8aa'],ox,oy);
  box(1.5,-0.8,0.8,1.8,1.4,0.14,['#88aa50','#689830','#98cc60'],ox,oy);

  // LEFT FRONT LEDGE
  box(-2.9,0.4,-0.5,2.0,2.0,0.7,['#bfb090','#a09070','#cfbfa0'],ox,oy);
  box(-2.8,0.5,0.2,1.8,1.8,0.12,['#78a040','#507820','#88b450'],ox,oy);

  // POOL
  cx.globalAlpha=0.82+0.08*Math.sin(t*1.5);
  box(-0.9,1.5,-1.6,2.2,1.4,0.22,['#5aaece','#3a8eaa','#70bede'],ox,oy);
  cx.globalAlpha=1;

  // WATERFALL
  cx.globalAlpha=0.55+0.18*Math.sin(t*3);
  box(-0.25,1.25,-0.05,0.22,0.22,1.65,['#88ccee','#5aaacc','#aaddff'],ox,oy);
  box(0.08,1.3,0.1,0.16,0.16,1.35,['#7ac0e0','#58a8ca','#9ad0f0'],ox,oy);
  cx.globalAlpha=1;

  // WATERFALL LEDGE
  box(-0.5,1.0,0.55,0.9,0.5,0.14,['#b8a890','#a09070','#c8b8a0'],ox,oy);

  // LOWER HOUSE
  box(-1.1,-0.8,0.88,2.2,1.7,1.35,['#9ab0bc','#7a9098','#aac0cc'],ox,oy);

  // PORCH
  box(-1.25,0.9,0.88,2.5,0.5,0.1,['#a07848','#886030','#b08858'],ox,oy);
  box(-1.15,1.35,0.98,2.3,0.08,0.22,['#8a6030','#704818','#9a7040'],ox,oy);
  box(-1.0,1.38,0.88,0.12,0.1,0.45,['#7a5020','#603808','#8a6030'],ox,oy);
  box(0.85,1.38,0.88,0.12,0.1,0.45,['#7a5020','#603808','#8a6030'],ox,oy);

  // UPPER HOUSE
  box(-0.85,-0.7,2.23,1.7,1.55,1.1,['#a0b8c4','#80a0a8','#b0c8d4'],ox,oy);

  // BALCONY
  box(-0.95,0.85,2.23,1.9,0.38,0.08,['#a07848','#886030','#b08858'],ox,oy);
  box(-0.85,1.18,2.31,1.7,0.07,0.18,['#8a6030','#704818','#9a7040'],ox,oy);

  // LOWER ROOF
  roofPrism(-1.3,-1.0,3.3,2.6,1.9,0.85,['#d48040','#b86020','#c87030'],ox,oy);
  // UPPER ROOF
  roofPrism(-1.05,-0.8,3.33,2.0,1.7,0.82,['#e08848','#c06828','#d07838'],ox,oy);

  // CHIMNEYS
  box(-0.25,-0.5,4.0,0.22,0.22,0.55,['#8a7060','#7a6050','#9a8070'],ox,oy);
  box(0.1,-0.5,4.0,0.18,0.18,0.55,['#8a7060','#7a6050','#9a8070'],ox,oy);

  // WINDOWS
  box(-0.8,-0.81,1.3,0.45,0.04,0.5,['#2a3a4a','#1a2a3a','#3a4a5a'],ox,oy);
  box(0.1,-0.81,1.3,0.45,0.04,0.5,['#2a3a4a','#1a2a3a','#3a4a5a'],ox,oy);
  box(-0.5,-0.71,2.5,0.45,0.04,0.45,['#2a3a4a','#1a2a3a','#3a4a5a'],ox,oy);

  // DOOR
  box(-0.25,-0.81,0.88,0.5,0.04,0.65,['#5a3820','#4a2810','#6a4830'],ox,oy);

  // BARRELS
  box(-1.45,0.82,0.88,0.32,0.32,0.36,['#8a6030','#6a4010','#9a7040'],ox,oy);
  box(-1.45,1.22,0.88,0.28,0.28,0.36,['#7a5020','#5a3000','#8a6030'],ox,oy);

  // TABLE
  box(-2.5,0.95,0.2,0.75,0.55,0.07,['#a07840','#886020','#b08850'],ox,oy);

  // FLOWERS
  const FC=['#e84020','#f0c010','#e03070','#f07020'];
  [[-1.8,-1.5],[-1.3,-1.8],[-0.5,-1.9],[0.2,-1.7],[0.9,-1.5],[1.1,-0.7],[-1.9,-0.7],[-1.6,-0.1]
  ].forEach(([fx,fz],i)=>{
    box(fx,fz,0.78,0.09,0.09,0.2,['#3a7a18','#287010','#4a8a28'],ox,oy);
    const fc=FC[i%4];
    box(fx-.05,fz-.05,0.98,0.18,0.18,0.1,[fc,shiftC(fc,-20),shiftC(fc,-10)],ox,oy);
  });

  // TREES
  tree(0.9,-1.9,0.64,1.0,'#4aaa3a',ox,oy);
  tree(-1.8,-1.6,0.64,0.7,'#3a8a2a',ox,oy);
  tree(1.9,0.1,0.94,0.65,'#90c840',ox,oy);
  tree(-2.6,1.1,0.32,0.55,'#5ab84a',ox,oy);

  // SMALL ROCKS
  [[1.7,-0.2,-0.2],[-1.9,1.3,-0.2],[0.5,1.9,-1.1]].forEach(([rx,rz,ry])=>{
    box(rx,rz,ry,0.28,0.28,0.2,['#a89880','#907860','#b8a890'],ox,oy);
  });

  t+=0.016;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
