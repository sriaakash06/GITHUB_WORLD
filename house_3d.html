<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D House - Three.js</title>
    <style>
        body { margin: 0; background: #ede8e0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: block; }
        .label {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            font-family: sans-serif; font-size: 13px; color: #888;
            background: rgba(255,255,255,0.7); padding: 4px 14px; border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="label">3D House — Three.js</div>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Set up scene
        const scene = new THREE.Scene();

        // Use orthographic camera to match the isometric look of the 2D canvas exactly
        const aspect = window.innerWidth / window.innerHeight;
        const d = 5;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
        
        // Isometric angle
        camera.position.set(20, 20, 20); // Looking towards origin
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // renderer.setClearColor('#ede8e0'); 
        // using transparent renderer so bod CSS background shows
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.5, 0);
        controls.update();

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xfffae0, 1.0);
        dirLight.position.set(10, 15, 5); 
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const helperLight = new THREE.DirectionalLight(0xb0cae0, 0.3);
        helperLight.position.set(-10, 10, -10);
        scene.add(helperLight);

        // Builders
        function createBox(x, z, y, w, d, h, color) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.8,
                flatShading: true
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x + w / 2, y + h / 2, z + d / 2);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        function createRoof(x, z, y, w, d, h, color) {
            const shape = new THREE.Shape();
            shape.moveTo(0, 0);
            shape.lineTo(w, 0);
            shape.lineTo(w / 2, h);
            shape.lineTo(0, 0);

            const extrudeSettings = {
                steps: 1,
                depth: d,
                bevelEnabled: false
            };

            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const material = new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.8,
                flatShading: true
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            // ExtrudeGeometry builds in XY and extrudes along Z.
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        // --- REBUILDING THE HOUSE FROM CANVAS ---

        // ISLAND LAYERS
        createBox(-4, -4, -2, 8, 8, 0.5, '#b8a898');
        createBox(-3.6, -3.6, -1.5, 7.2, 7.2, 0.5, '#c4b49e');
        createBox(-3.2, -3.2, -1.0, 6.4, 6.4, 0.5, '#ccbba8');
        createBox(-2.8, -2.8, -0.5, 5.6, 5.6, 0.5, '#d4c4ae');
        createBox(-2.5, -2.5, 0.0, 5.0, 5.0, 0.5, '#ddd0b8');

        // TOP GROUND
        createBox(-2.2, -2.2, 0.5, 4.4, 4.4, 0.28, '#7ab860');
        createBox(-1.3, -0.9, 0.78, 2.6, 2.0, 0.1, '#c4a868'); // dirt patch

        // RIGHT LEDGE
        createBox(1.4, -1.0, 0.0, 2.0, 1.8, 0.8, '#c8b89a');
        createBox(1.5, -0.8, 0.8, 1.8, 1.4, 0.14, '#88aa50');

        // LEFT FRONT LEDGE
        createBox(-2.9, 0.4, -0.5, 2.0, 2.0, 0.7, '#bfb090');
        createBox(-2.8, 0.5, 0.2, 1.8, 1.8, 0.12, '#78a040');

        // POOL 
        const poolMaterial = new THREE.MeshStandardMaterial({
            color: '#5aaece', transparent: true, opacity: 0.85, roughness: 0.1, metalness: 0.1
        });
        const poolGeo = new THREE.BoxGeometry(2.2, 0.22, 1.4);
        const poolMesh = new THREE.Mesh(poolGeo, poolMaterial);
        poolMesh.position.set(-0.9 + 1.1, -1.6 + 0.11, 1.5 + 0.7);
        poolMesh.receiveShadow = true;
        scene.add(poolMesh);

        // LOWER HOUSE
        createBox(-1.1, -0.8, 0.88, 2.2, 1.7, 1.35, '#9ab0bc');

        // PORCH
        createBox(-1.25, 0.9, 0.88, 2.5, 0.5, 0.1, '#a07848');
        createBox(-1.15, 1.35, 0.98, 2.3, 0.08, 0.22, '#8a6030');
        createBox(-1.0, 1.38, 0.88, 0.12, 0.1, 0.45, '#7a5020');
        createBox(0.85, 1.38, 0.88, 0.12, 0.1, 0.45, '#7a5020');

        // UPPER HOUSE
        createBox(-0.85, -0.7, 2.23, 1.7, 1.55, 1.1, '#a0b8c4');

        // BALCONY
        createBox(-0.95, 0.85, 2.23, 1.9, 0.38, 0.08, '#a07848');
        createBox(-0.85, 1.18, 2.31, 1.7, 0.07, 0.18, '#8a6030');

        // LOWER ROOF
        createRoof(-1.3, -1.0, 3.3, 2.6, 1.9, 0.85, '#d48040');
        // UPPER ROOF
        createRoof(-1.05, -0.8, 3.33, 2.0, 1.7, 0.82, '#e08848');

        // CHIMNEYS
        createBox(-0.25, -0.5, 4.0, 0.22, 0.22, 0.55, '#8a7060');
        createBox(0.1, -0.5, 4.0, 0.18, 0.18, 0.55, '#8a7060');

        // WINDOWS
        createBox(-0.8, -0.81, 1.3, 0.45, 0.04, 0.5, '#2a3a4a');
        createBox(0.1, -0.81, 1.3, 0.45, 0.04, 0.5, '#2a3a4a');
        createBox(-0.5, -0.71, 2.5, 0.45, 0.04, 0.45, '#2a3a4a');

        // DOOR
        createBox(-0.25, -0.81, 0.88, 0.5, 0.04, 0.65, '#5a3820');

        // BARRELS
        createBox(-1.45, 0.82, 0.88, 0.32, 0.32, 0.36, '#8a6030');
        createBox(-1.45, 1.22, 0.88, 0.28, 0.28, 0.36, '#7a5020');

        // TABLE
        createBox(-2.5, 0.95, 0.2, 0.75, 0.55, 0.07, '#a07840');

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
